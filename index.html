<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Elms+Sans:ital,wght@0,100..900;1,100..900&family=Maven+Pro:wght@400..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/home.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SURGE</title>
</head>
<body>
    <header>
        <nav class="main-nav glass-panel">
            <div class="links-container">
                <a href="#" class="nav-link active">Home</a>
                <a href="#" class="nav-link">Products</a>
                <a href="#" class="nav-link">Contact Us</a>
            </div>

            <img src="public/Surge Main Logo.svg" alt="">

            <div>
                <a href="#" class="nav-link">Distributers</a>
                <a href="#" class="nav-link">About</a>
                <a href="#" class="nav-link">Contact</a>
            </div>
        </nav>

        <div class="header-bottle"></div>
        <div class="header-slogan"></div>
        <div class="header-slogan-1"></div>
        <div class="header-slogan-2"></div>

        <div class="quick-links">
            <a href="#" class="quick-button glass-panel red-hover">View Distributers</a>
            <a href="#" class="quick-button glass-panel red-hover">View Products</a>
        </div>
    </header>

    <section class="product-section">
        <h2 class="product-title">Our Drinks</h2>
        <div class="horizontal-container">
            <div class="product-card">
                <div class="product-background" id="productBackground1">

                    <div class="product-img" id="productImg1">
    
                    </div>
                </div>

                <h3>Low Sugar Edition (355 ml)</h3>
                <p>50 Calories</p>
            </div>


            <div class="product-card">
                <div class="product-background" id="productBackground2">

                    <div class="product-img" id="productImg2">
    
                    </div>
                </div>

                <h3>Zero Sugar Edition (355 ml)</h3>
                <p>20 Calories</p>
            </div>
        </div>

        <div class="quick-links">
            <a href="#" class="quick-button black-button">View Distributers</a>
            <a href="#" class="quick-button black-button">View Products</a>
        </div>
    </section>

</body>
</html>
